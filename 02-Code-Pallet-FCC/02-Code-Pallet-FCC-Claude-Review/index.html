<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Color Palette Generator</h1>
      <button id="generate-btn">
        <i class="fa-solid fa-rotate" aria-hidden="true"></i>
        Generate Palette
      </button>
      <!--
        The 5 color boxes below are generated by script.js on page load
        (see createColorBox()), so this container starts empty.
        Keeping markup generation in one place (JS) avoids duplicating
        the same block 5x in HTML and keeps JS/HTML in sync automatically.
      -->
      <div class="palette-container" id="palette-container"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
