<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Pallet Generators</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Color Palette Generator</h1>
      <button id="generate-btn">
        <i class="fa-solid fa-rotate"></i>
        Generate Pallet
      </button>
      <div class="pallet-container" id="color-generated">
        <!-- color 1 -->
        <div class="color-box">
          <div class="color" style="background-color: #920092"></div>
          <div class="color-info">
            <span class="hex-value">#920092</span>
            <i class="fa-solid fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <!-- color 2 -->
        <div class="color-box">
          <div class="color" style="background-color: #924400"></div>
          <div class="color-info">
            <span class="hex-value">#924400</span>
            <i class="fa-solid fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <!-- color 3 -->
        <div class="color-box">
          <div class="color" style="background-color: #f0bcf0"></div>
          <div class="color-info">
            <span class="hex-value">#f0bcf0</span>
            <i class="fa-solid fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <!-- color 4 -->
        <div class="color-box">
          <div class="color" style="background-color: #005592"></div>
          <div class="color-info">
            <span class="hex-value">#005592</span>
            <i class="fa-solid fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <!-- color 5 -->
        <div class="color-box">
          <div class="color" style="background-color: #360092"></div>
          <div class="color-info">
            <span class="hex-value">#360092</span>
            <i class="fa-solid fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
